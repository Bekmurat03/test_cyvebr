<!doctype html>
<html lang="kk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {% block title %}CTF Practice Platform – Module A{% endblock %}
    </title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
    {% block extra_head %}{% endblock %}
  </head>
  <body>
    {% if session.username %}
    <!-- NAVBAR -->
    <nav class="ctf-nav navbar navbar-expand-lg">
      <div class="container-fluid px-4">
        <a class="navbar-brand ctf-brand" href="{{ url_for('dashboard') }}">
          <span class="brand-icon">⚡</span>
          <span class="brand-text"
            >CTF<span class="brand-accent"> M:A</span></span
          >
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto align-items-center gap-2">
            <li class="nav-item">
              <a
                class="nav-link ctf-nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}"
                href="{{ url_for('dashboard') }}"
                >🏠 Dashboard</a
              >
            </li>
            <li class="nav-item">
              <a
                class="nav-link ctf-nav-link {% if request.endpoint == 'scoreboard' %}active{% endif %}"
                href="{{ url_for('scoreboard') }}"
                >🏆 Scoreboard</a
              >
            </li>
            <li class="nav-item">
              <span class="score-badge">
                {{ score }}<span class="score-max"
                  >/{{ session.get('max_score', 60) }}</span
                >
                pts
              </span>
            </li>
            <li class="nav-item">
              <span class="nav-username">👤 {{ session.username }}</span>
            </li>
            <li class="nav-item">
              <a
                class="btn btn-outline-danger btn-sm ms-2"
                href="{{ url_for('logout') }}"
                >Шығу</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Scan-line overlay -->
    <div class="scanline-overlay"></div>
    {% endif %}

    <main class="ctf-main">{% block content %}{% endblock %}</main>

    <!-- Terminal cursor blink -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_scripts %}{% endblock %}
  </body>
</html>
